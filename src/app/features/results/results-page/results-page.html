<app-navigation-component />

<main class="page-shell">
  <header class="results-header">
    <div>
      <a routerLink="/dashboard" class="back-link">Dashboard</a>
      <h1 class="section-title">{{ survey()?.title }} results</h1>
      <p class="section-copy">{{ submissions().length }} participant submissions</p>
    </div>
    <button mat-flat-button type="button" (click)="downloadCsv()">
      <mat-icon>download</mat-icon>
      CSV
    </button>
  </header>

  <section class="panel table-panel">
    <table mat-table [dataSource]="submissions()">
      <ng-container matColumnDef="session">
        <th mat-header-cell *matHeaderCellDef>Session</th>
        <td mat-cell *matCellDef="let submission">{{ submission.sessionId }}</td>
      </ng-container>

      <ng-container matColumnDef="completedAt">
        <th mat-header-cell *matHeaderCellDef>Completed</th>
        <td mat-cell *matCellDef="let submission">{{ submission.completedAt }}</td>
      </ng-container>

      <ng-container matColumnDef="answers">
        <th mat-header-cell *matHeaderCellDef>Answers</th>
        <td mat-cell *matCellDef="let submission">{{ submission.answers.length }}</td>
      </ng-container>

      <ng-container matColumnDef="meanReaction">
        <th mat-header-cell *matHeaderCellDef>Mean reaction</th>
        <td mat-cell *matCellDef="let submission">{{ meanReaction(submission) }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </section>

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }
</main>
